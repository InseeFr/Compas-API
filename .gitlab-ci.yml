include:
  - component: "${CI_SERVER_FQDN}/sndi-lille/ressources-communes/components/meta-component-java-kube/meta-components@3.0.1"
    inputs:
      sonar_token: ${SONAR_KEY}
      sonar_project_key: ${SONAR_PROJECT_KEY}
      sonar_props_java: >
          -Dsonar.coverage.exclusions=src/test/java/**
          -Dsonar.java.binaries=target/classes
          -Dsonar.java.coveragePlugin=jacoco
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
          -Dsonar.exclusions=**/test/**,**/*Test*.java,**/*Tests*.java,**/*TestCase*.java
          -Dsonar.junit.reportPaths=target/surefire-reports/*.xml
          -Dsonar.java.libraries=target/dependency/*.jar
      maven_java_version: 25
      maven_build_args_opts: -Drevision=${CLEANED_TAG_AND_VERSION_NAME}
      trivy_path_to_trivyignore: "${CI_PROJECT_DIR}/.trivyignore"
      auto_tags_with_semver: false
  - project: 'kubernetes/kubeapp/ci-templates'
    ref: main
    file:
      - '/utils.yaml'
  - component: "${CI_SERVER_FQDN}/outils-transverses/services-transverses/mirroring-component/mirroring-pipeline@0.0.2"
    inputs:
        project_id_gitlab: "${CI_PROJECT_ID}"
        personnal_token_gitlab: "${GITHUB_MR_TOKEN}"
        project_github_name: "Compas-API"
        username_personnal_github: "${GITHUB_MIRROR_USERNAME}"
        personnal_token_github: "${GITHUB_TOKEN_MIRRORING}"
        chemin_gitlab_project: "dsi/compas/compas-api"
  - component: "$CI_SERVER_FQDN/outils-transverses/services-dev/versionning-component/versionning-pipeline@0.0.2"
    inputs:
      projectId: $CI_PROJECT_ID
      ecosystem: 'maven'
      token: $GITHUB_MR_TOKEN


stages:
  - check-source-branch
  - security-app
  - build-app-and-test
  - quality
  - 🪞mirroir mon beau mirroir
  - versionning-apply
  - calculate-version-and-release
  - tag
  - prepare-and-trigger-docker
  - docker
  - release-gitops


release-gitops-dev1:
  stage: release-gitops
  extends: .template:gitops-updater-v2
  variables:
    REPO: "https://gitlab.insee.fr/dsi/Compas/CompasGitops.git"
    BRANCH: "master"
    PATH_TO_VALUE: "apps/compas-api-dev1/values.yaml"
    KEY_TO_CHANGE: "api-appli-compas.image.tag"
    NEW_VALUE: "${CLEANED_TAG_AND_VERSION_NAME}"
    USERNAME: "${GITOPS_USERNAME}"
    PASSWORD_VAR: "${GITOPS_TOKEN}"
    AUTOMERGE: "true"

  rules:
    - when: manual


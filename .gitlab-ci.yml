include:
  - component: "${CI_SERVER_FQDN}/sndi-lille/ressources-communes/components/meta-component-java-kube/meta-components@2.0.0"
    inputs:
      sonar_token: ${SONAR_KEY}
      sonar_project_key: ${SONAR_PROJECT_KEY}
      sonar_props_java: >
          -Dsonar.coverage.exclusions=src/test/java/**
          -Dsonar.java.binaries=target/classes
          -Dsonar.java.coveragePlugin=jacoco
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
          -Dsonar.exclusions=**/test/**,**/*Test*.java,**/*Tests*.java,**/*TestCase*.java
          -Dsonar.junit.reportPaths=target/surefire-reports/*.xml
          -Dsonar.java.libraries=target/dependency/*.jar
      maven_java_version: 25
      maven_build_args_opts: -Drevision=${CLEANED_TAG_AND_VERSION_NAME}
      trivy_path_to_trivyignore: "${CI_PROJECT_DIR}/.trivyignore"
      auto_tags_with_semver: false
  - project: 'kubernetes/kubeapp/ci-templates'
    ref: main
    file:
      - '/utils.yaml'


stages:
  - check-source-branch
  - security-app
  - build-app-and-test
  - quality
  - mirroring
  - calculate-version-and-release
  - tag
  - prepare-docker
  - trigger-docker
  - docker
  - release-gitops


fetch-source-github:
  stage: mirroring
  image: gitlab-registry.insee.fr:443/kubernetes/images/build/alpine:latest
  script:
    - git remote add github_compas_api https://${GITHUB_MIRROR_USERNAME}:${GITHUB_TOKEN_MIRRORING}@github.com/InseeFr/Compas-API.git
    - git fetch github_compas_api
    - git merge github_compas_api/main --ff-only
    - git push origin HEAD:main
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

mirror-api-to-github:
    stage: mirroring
    image: gitlab-registry.insee.fr:443/kubernetes/images/build/alpine:latest
    variables:
      GIT_DEPTH: 0
    needs:
      - fetch-source-github
    script:
      - git remote add github_compas_api https://${GITHUB_MIRROR_USERNAME}:${GITHUB_TOKEN_MIRRORING}@github.com/InseeFr/Compas-API.git
      - git push github_compas_api HEAD:main
    rules:
      - if: '$CI_COMMIT_BRANCH == "main"'
        when: manual

release-gitops-dev1:
  stage: release-gitops
  extends: .template:gitops-updater-v2
  variables:
    REPO: "https://gitlab.insee.fr/dsi/Compas/CompasGitops.git"
    BRANCH: "master"
    PATH_TO_VALUE: "apps/compas-api-dev1/values.yaml"
    KEY_TO_CHANGE: "api-appli-compas.image.tag"
    NEW_VALUE: "${CLEANED_TAG_AND_VERSION_NAME}"
    USERNAME: "${GITOPS_USERNAME}"
    PASSWORD_VAR: "${GITOPS_TOKEN}"
    AUTOMERGE: "true"

  rules:
    - when: manual


include:
  - component: "${CI_SERVER_FQDN}/sndi-lille/ressources-communes/components/meta-component-java-kube/meta-components@2.0.0"
    inputs:
      sonar_token: ${SONAR_KEY}
      sonar_project_key: ${SONAR_PROJECT_KEY}
      sonar_props_java: >
          -Dsonar.coverage.exclusions=src/test/java/**
          -Dsonar.java.binaries=target/classes
          -Dsonar.java.coveragePlugin=jacoco
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
          -Dsonar.exclusions=**/test/**,**/*Test*.java,**/*Tests*.java,**/*TestCase*.java
          -Dsonar.junit.reportPaths=target/surefire-reports/*.xml
          -Dsonar.java.libraries=target/dependency/*.jar
      maven_java_version: 25
      maven_build_args_opts: -Drevision=${CLEANED_TAG_AND_VERSION_NAME}
      trivy_path_to_trivyignore: "${CI_PROJECT_DIR}/.trivyignore"
      auto_tags_with_semver: false
  - project: 'kubernetes/kubeapp/ci-templates'
    ref: main
    file:
      - '/utils.yaml'


stages:
  - check-source-branch
  - security-app
  - build-app-and-test
  - quality
  - mirroring
  - calculate-version-and-release
  - tag
  - prepare-docker
  - trigger-docker
  - docker
  - release-gitops

sync-from-github:
  stage: mirroring
  image: gitlab-registry.insee.fr:443/kubernetes/images/build/alpine:latest
  variables:
    GIT_DEPTH: 0
  script:
    - apk add --no-cache curl jq
    - |
      GH_PRS=$(curl --silent \
        --header "Authorization: Bearer ${GITHUB_TOKEN_MIRRORING}" \
        --header "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/InseeFr/Compas-API/pulls?state=open")
      echo "PRs GitHub trouvées : $(echo "$GH_PRS" | jq 'length')"

      echo "$GH_PRS" | jq -c '.[]' | while read -r PR; do
        PR_NUMBER=$(echo "$PR" | jq -r '.number')
        PR_TITLE=$(echo "$PR"  | jq -r '.title')
        PR_BODY=$(echo "$PR"   | jq -r '.body // ""')
        PR_BRANCH=$(echo "$PR" | jq -r '.head.ref')

        echo "--- Traitement PR #${PR_NUMBER} : ${PR_TITLE} (branche: ${PR_BRANCH})"

        git fetch https://${GITHUB_MIRROR_USERNAME}:${GITHUB_TOKEN_MIRRORING}@github.com/InseeFr/Compas-API.git "${PR_BRANCH}" || {
          echo "⚠️  Impossible de fetch la branche ${PR_BRANCH}, on passe."
          continue
        }
        git push https://oauth2:${GITHUB_MR_TOKEN}@gitlab.insee.fr/dsi/compas/compas-api.git "FETCH_HEAD:refs/heads/${PR_BRANCH}" || {
          echo "⚠️  Push de ${PR_BRANCH} échoué, on passe."
          continue
        }

        CREATE_RESPONSE=$(jq -n \
          --arg source "${PR_BRANCH}" \
          --arg target "main" \
          --arg title  "[GitHub PR #${PR_NUMBER}] ${PR_TITLE}" \
          --arg desc   "${PR_BODY}" \
          '{source_branch: $source, target_branch: $target, title: $title, description: $desc, remove_source_branch: false}' \
          | curl --silent --request POST \
              --header "PRIVATE-TOKEN: ${GITHUB_MR_TOKEN}" \
              --header "Content-Type: application/json" \
              --data @- \
              "https://gitlab.insee.fr/api/v4/projects/${CI_PROJECT_ID}/merge_requests")

        echo "Réponse GitLab : $CREATE_RESPONSE"

        MR_IID=$(echo "$CREATE_RESPONSE" | jq '.iid // null')
        if [ "$MR_IID" != "null" ]; then
          echo "MR créée #${MR_IID} ✅"
        else
          echo "MR déjà existante ou erreur : $(echo "$CREATE_RESPONSE" | jq -r '.message // "inconnue"')"
        fi
      done
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual


mirror-api-to-github:
  stage: mirroring
  image: gitlab-registry.insee.fr:443/kubernetes/images/build/alpine:latest
  variables:
    GIT_DEPTH: 0
  script:
    - git remote add github_compas_api https://${GITHUB_MIRROR_USERNAME}:${GITHUB_TOKEN_MIRRORING}@github.com/InseeFr/Compas-API.git
    - git push github_compas_api HEAD:main
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual

release-gitops-dev1:
  stage: release-gitops
  extends: .template:gitops-updater-v2
  variables:
    REPO: "https://gitlab.insee.fr/dsi/Compas/CompasGitops.git"
    BRANCH: "master"
    PATH_TO_VALUE: "apps/compas-api-dev1/values.yaml"
    KEY_TO_CHANGE: "api-appli-compas.image.tag"
    NEW_VALUE: "${CLEANED_TAG_AND_VERSION_NAME}"
    USERNAME: "${GITOPS_USERNAME}"
    PASSWORD_VAR: "${GITOPS_TOKEN}"
    AUTOMERGE: "true"

  rules:
    - when: manual


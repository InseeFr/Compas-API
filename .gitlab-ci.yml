default:
  image: gitlab-registry.insee.fr:443/kubernetes/images/build/maven-jdk:21
  tags:
    - docker

include:
  - project: "kubernetes/kubeapp/ci-templates"
    ref: main
    file: "images.yaml"

stages:
  - formatting
  - build 🔨
  - docker 👾
  - test 🙈
  - release ⭐
  - analyse

variables:
  HTTP_PROXY: http://proxy-app.insee.fr:3128
  http_proxy: http://proxy-app.insee.fr:3128
  HTTPS_PROXY: http://proxy-app.insee.fr:3128
  https_proxy: http://proxy-app.insee.fr:3128
  NO_PROXY: ".insee.fr,.insee.eu,.insee.intra,localhost,insee.test"
  no_proxy: ".insee.fr,.insee.eu,.insee.intra,localhost,insee.test"
  GITLEAKS_IMAGE: zricethezav/gitleaks:latest
  GITLEAKS_ARGS: '--verbose --redact'

.template:release-docker-dev:
  stage: release ⭐
  tags:
    - docker
  extends: .template:docker_push_internal
  needs: ["build-docker-dev"]
  when: manual

job_code_formatting:
  stage: formatting
  script:
    - mvn spotless:check

build-app:
  stage: build 🔨
  script:
    - "mvn -V package"
  artifacts:
    untracked: true
    paths:
      - ./target/ROOT.jar
    
    expire_in: 1 day

build-docker:
  stage: docker 👾
  tags:
    - docker
  extends: .template:docker_build
  variables:
    PATH_TO_DOCKERFILE: Dockerfile
  only:
  - tags

build-docker-dev:
  stage: docker 👾
  tags:
    - docker
  extends: .template:docker_build
  variables:
    PATH_TO_DOCKERFILE: Dockerfile
  when: on_success

test-docker:
  stage: test 🙈
  tags:
    - docker
  extends: .template:docker_check
  variables:
    SEVERITY_LEVELS: HIGH,CRITICAL
    REPORT_NAME: gl-container-scanning-report-${CI_PROJECT_NAME}-${CI_COMMIT_REF_SLUG}.xml
  allow_failure: true
  only:
  - tags
  
release-docker:
  stage: release ⭐
  tags:
    - docker
  extends: .template:docker_push_internal
  variables:
    IMAGE_TAG: ${CI_COMMIT_REF_NAME}
  only:
  - tags

release-docker-dev1:
  extends: .template:release-docker-dev
  variables:
    IMAGE_TAG: dev1

release-docker-dev2:
  extends: .template:release-docker-dev
  variables:
    IMAGE_TAG: dev2

release-docker-dev3:
  extends: .template:release-docker-dev
  variables:
    IMAGE_TAG: dev3

release-docker-dev4:
  extends: .template:release-docker-dev
  variables:
    IMAGE_TAG: dev4

release-docker-dev5:
  extends: .template:release-docker-dev
  variables:
    IMAGE_TAG: dev5

release-docker-dev6:
  extends: .template:release-docker-dev
  variables:
    IMAGE_TAG: dev6

release-docker-dev7:
  extends: .template:release-docker-dev
  variables:
    IMAGE_TAG: dev7

sonarqube:
  stage: analyse
  script:
    - echo "Analyse SONAR et envoi sur $SONAR_URL du projet [${CI_PROJECT_PATH}], PROJECT_ID=[${CI_PROJECT_ID}]  ${CI_COMMIT_BRANCH}"
    - mvn $MAVEN_CLI_OPTS clean verify sonar:sonar -Dsonar.host.url=$SONAR_URL -Dsonar.login=$SONAR_KEY
  allow_failure: true

sonarqube_mr:
  stage: analyse
  script:
    - echo "Analyse SONAR et envoi sur $SONAR_URL du projet [${CI_PROJECT_PATH}], PROJECT_ID=[${CI_PROJECT_ID}]  ${CI_COMMIT_REF_NAME}"
    - mvn clean verify sonar:sonar -Dsonar.host.url=$SONAR_URL -Dsonar.login=$SONAR_KEY -Dsonar.pullrequest.key=$CI_MERGE_REQUEST_IID -Dsonar.pullrequest.branch=${CI_COMMIT_REF_NAME} -Dsonar.pullrequest.base=main
  rules:
    - if: '$CI_MERGE_REQUEST_IID'
  allow_failure: true
  
gitleaks:
  image:
    name: $GITLEAKS_IMAGE
    entrypoint: [""]
  stage: analyse
  needs: []
  variables:
    GIT_DEPTH: 0
  before_script:
    - mkdir -p -m 777 reports
    - git config --global --add safe.directory "${CI_PROJECT_DIR}"
  script:
    - gitleaks git --report-path reports/gitleaks.native.json $GITLEAKS_ARGS .
  artifacts:
    name: "$CI_JOB_NAME artifacts from $CI_PROJECT_NAME on $CI_COMMIT_REF_SLUG"
    when: always
    paths:
      - reports/gitleaks.
  allow_failure: true

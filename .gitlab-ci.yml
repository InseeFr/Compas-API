release-gitops-prod:
  stage: release-gitops
  extends: .template:gitops-updater-v2
  variables:
    REPO: "https://gitlab.insee.fr/dsi/Compas/Compas-gitops-production.git"
    BRANCH: "main"
    PATH_TO_VALUE: "apps/compas-api/values.yaml"
    KEY_TO_CHANGE: "api-appli-compas.image.tag"
    NEW_VALUE: "${CLEANED_TAG_AND_VERSION_NAME}"
    USERNAME: "${GITOPS_USERNAME_PROD}"
    PASSWORD_VAR: "${GITOP_TOKEN_PROD_TAG}"
    AUTOMERGE: "true"
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
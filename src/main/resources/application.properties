fr.insee.compas.score.application.pression-max-disk= 18000

fr.insee.compas.score.module.conso-max= 750
fr.insee.compas.score.module.pression-max-ram= 800
fr.insee.compas.score.module.pression-max-cpu= 900000
fr.insee.compas.score.module.pression-max-disk= 4000


fr.insee.compas.score.application.conso-facteur-utilisation = 0.6
fr.insee.compas.score.module.conso-facteur-utilisation = 0.6

spoc.username=appli_COMPAS

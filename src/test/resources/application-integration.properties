spring.application.name=oscar-service
spring.cloud.openfeign.client.config.oscar-service.url = http://localhost:8010
spring.cloud.openfeign.oauth2.clientRegistrationId=keycloak
spring.cloud.openfeign.oauth2.enabled=true

compas.web.springdoc.token-url=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/token
keycloak.auth-server-url=https://auth.insee.test/auth
keycloak.realm=agents-insee-interne
compas.service.keycloak.client=compas-service
compas.service.keycloak.authorization-grant-type=
compas.service.keycloak.credentials.secret=
compas.service.keycloak.client-name=
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration


oscar.client.authType=none
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.flyway.enabled=false
spoc.username=appli_COMPAS
compas.service.spoc.password=
spoc.url=https://api-spoc-envoi.recette.insee.fr/send
sender.mail=noreply-compas@insee.fr
default.receiver.mail=colin.despouys@insee.fr
receiver.mail.add.balf.oscar=FALSE
mail.cve.alert.severity=CRITICAL,HIGH
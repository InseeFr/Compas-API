server.port=8009
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:test;MODE=PostgreSQL;
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=admin
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.data-locations=optional:classpath*:script/init-data.sql
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.OAuth2ClientAutoConfiguration

compas.web.springdoc.token-url=${keycloak.auth-server-url}/realms/${keycloak.realm}/protocol/openid-connect/token
keycloak.auth-server-url=https://auth.insee.test/auth
keycloak.realm=agents-insee-interne
compas.service.keycloak.client=compas-service
compas.service.keycloak.authorization-grant-type=
compas.service.keycloak.credentials.secret=
compas.service.keycloak.client-name=oscarClient
